spring.application.name=backend-admin

server.port=9091

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.security=DEBUG

# JWT
jwt.secret=super-secret-key-minimum-256-bits-for-hs256-algorithm
jwt.expiration=86400000

# Main backend
main.backend.url=http://localhost:9090

# Secret intre backend-admin si backend principal
internal.api.secret=admin-service-secret-123